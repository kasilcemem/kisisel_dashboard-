<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Sinema Arşivi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0c10; color: #c9d1d9; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #161b22; padding: 15px; text-align: center; border-bottom: 1px solid #30363d; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h1 { color: #f85149; margin: 0; font-size: 1.5em; letter-spacing: 1px; }
        .main-layout { display: grid; grid-template-columns: 1fr 3fr 1fr; gap: 10px; padding: 15px; flex-grow: 1; overflow: hidden; }
        .sidebar { background: #0d1117; border-radius: 8px; border: 1px solid #30363d; padding: 15px; overflow-y: auto; }
        .cinema-screen { background: #000; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #f85149; position: relative; }
        .video-wrapper { width: 100%; height: 80%; }
        iframe { width: 100%; height: 100%; border: none; }
        .card-title { font-size: 0.9em; font-weight: bold; color: #58a6ff; margin-bottom: 15px; border-bottom: 1px solid #30363d; padding-bottom: 5px; text-transform: uppercase; }
        .links a { display: block; color: #8b949e; text-decoration: none; padding: 8px 5px; font-size: 0.85em; border-radius: 4px; transition: 0.2s; }
        .links a:hover { background: #21262d; color: #f85149; padding-left: 10px; }
        .status-bar { padding: 10px; background: #161b22; font-size: 0.7em; text-align: center; color: #484f58; }
    </style>
</head>
<body>

<header>
    <h1>🎞️ BAĞIMSIZ SİNEMA KOLEKSİYONU</h1>
</header>

<div class="main-layout">
    <!-- SOL: KÜRESEL KÜTÜPHANE BAĞLANTILARI -->
    <div class="sidebar">
        <div class="card-title">🏛️ Küresel Arşivler</div>
        <div class="links">
            <a href="https://archive.org/details/feature_films?sort=-downloads" target="_blank">📽️ Internet Archive (En Popüler)</a>
            <a href="https://www.youtube.com/c/mosfilm/videos" target="_blank">🇷🇺 Mosfilm Klasikleri</a>
            <a href="https://www.openculture.com/freemoviesonline" target="_blank">📜 Open Culture Arşivi</a>
            <a href="https://www.youtube.com/playlist?list=PL_Xv0K_XoXfX7XfL6Xf8XfX" target="_blank">📺 Bağımsız Seçkiler</a>
            <a href="https://vimeo.com/channels/staffpicks" target="_blank">🎬 Vimeo Staff Picks</a>
        </div>
    </div>

    <!-- ORTA: ANA EKRAN -->
    <div class="cinema-screen">
        <div class="video-wrapper">
            <iframe id="player" src="https://www.youtube.com/embed/gdtEZEH7AnY" allowfullscreen></iframe>
        </div>
        <div style="padding: 15px; text-align: center;">
            <p style="font-size: 0.9em; color: #8b949e;">Şu an oynatılan: <b>Koleksiyon Başyapıtı</b></p>
        </div>
    </div>

    <!-- SAĞ: SENİN ÖZEL ARŞİVİN -->
    <div class="sidebar">
        <div class="card-title">📂 Senin Arşivin</div>
        <div class="links">
            <!-- SINEMA_LISTESI -->
            <!-- MIMARI_LISTESI -->
            <!-- BONSAI_LISTESI -->
        </div>
    </div>
</div>

<div class="status-bar">
    Kaş Arşivi Bağlantısı Aktif | Python Asistan Otomasyonu Devrede
</div>

</body>
</html>

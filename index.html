<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişisel Bilgi Üssü</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 15px; border-left: 5px solid #4CAF50; }
        h1 { color: #4CAF50; }
        .links a { display: block; color: #88cefa; text-decoration: none; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>Dijital Dashboard</h1>
    <div class="grid">
        <!-- Bonsai Bölümü -->
        <div class="card">
            <h3>🌿 Bonsai Arşivi</h3>
            <div id="bonsai-list" class="links">
                <!-- Python burayı otomatik dolduracak -->
            </div>
        </div>

        <!-- Mimari Bölümü -->
        <div class="card">
            <h3>🏗️ Mimari Projeler</h3>
            <div id="mimari-list" class="links">
                <!-- Python burayı otomatik dolduracak -->
            </div>
        </div>

        <!-- Radyo/Müzik Bölümü -->
        <div class="card">
            <h3>📻 Dünya Radyoları</h3>
            <p>Hangi frekansı ekleyelim?</p>
        </div>
    </div>
</body>
</html>

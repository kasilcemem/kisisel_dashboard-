<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişisel Sinema Salonu</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #05070a; color: #e2e8f0; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .cinema-screen { width: 100%; max-width: 1000px; background: #000; margin-top: 20px; border-radius: 12px; box-shadow: 0 0 50px rgba(231, 76, 60, 0.2); overflow: hidden; border: 1px solid #30363d; }
        .controls { width: 100%; max-width: 1000px; padding: 20px; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .card { background: #111418; padding: 20px; border-radius: 12px; border: 1px solid #1e293b; }
        h1 { color: #e74c3c; font-size: 1.2em; text-transform: uppercase; margin: 20px 0 10px 0; }
        .links a { display: block; color: #94a3b8; text-decoration: none; padding: 10px; border-bottom: 1px solid #1e293b; transition: 0.3s; font-size: 0.9em; }
        .links a:hover { background: #1e293b; color: #e74c3c; border-radius: 5px; }
        .archive-list { max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>

    <h1>🎬 Bağımsız Sinema Paneli</h1>

    <!-- ANA EKRAN (VİDEO OYNATICI) -->
    <div class="cinema-screen">
        <iframe id="main-player" width="100%" height="560" src="https://www.youtube.com/embed/gdtEZEH7AnY" frameborder="0" allowfullscreen></iframe>
    </div>

    <div class="controls">
        <!-- KENDİ ARŞİVİN -->
        <div class="card">
            <h3>📂 Senin Arşivin (Yüklenenler)</h3>
            <div class="links archive-list">
                <a href="veriler/sinema/Neufert.url" target="_blank">📂 Neufert.url</a>
<a href="veriler/sinema/ArchDaily.url" target="_blank">📂 ArchDaily.url</a>
<a href="veriler/sinema/Neufert.url" target="_blank">▶️ Neufert.url</a>
<a href="veriler/sinema/ArchDaily.url" target="_blank">▶️ ArchDaily.url</a>
<!-- SINEMA_LISTESI -->
            </div>
        </div>
    </div>

    <!-- MİMARİ VE BONSAI ALT BÖLÜM -->
    <div class="controls" style="margin-top:0;">
        <div class="card"><h3>🏗️ Mimari</h3><div class="links"><!-- MIMARI_LISTESI -->
<!-- BONSAI_LISTESI --></div></div>
    </div>

</body>
</html>

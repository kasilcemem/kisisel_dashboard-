<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaş Dijital Arşiv</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #f85149; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; max-width: 1400px; margin: auto; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        h2 { color: var(--accent); border-bottom: 1px solid #30363d; padding-bottom: 10px; font-size: 1.1rem; }
        .links a { display: block; background: #21262d; color: #58a6ff; text-decoration: none; padding: 10px; margin: 5px 0; border-radius: 6px; font-size: 0.9rem; transition: 0.2s; }
        .links a:hover { background: #30363d; transform: translateX(5px); }
        iframe { width: 100%; height: 450px; border-radius: 8px; border: 1px solid #30363d; background: #000; }
    </style>
</head>
<body>

<div class="grid">
    <!-- SOL KOLON: SİNEMA -->

            <h2>🎬 SİNEMA EKRANI</h2>

        </div>
        
        <div class="card">
            <h2>📂 SENİN FİLM ARŞİVİN</h2>
            <div class="links">
                <a href="veriler/sinema/yeni_film.url" target="_blank">📄 yeni_film.url</a>
<a href="veriler/sinema/Neufert.url" target="_blank">📄 Neufert.url</a>

<a href="veriler/sinema/mirror_tarkowski.url" target="_blank">📄 mirror_tarkowski.url</a>
<!-- SINEMA_LISTESI -->
            </div>
        </div>
    </div>
</div>

</body>
</html>

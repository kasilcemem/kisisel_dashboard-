<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaş Bilgi Üssü</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #f85149; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; max-width: 1400px; margin: auto; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        h2 { color: var(--accent); border-bottom: 1px solid #30363d; padding-bottom: 10px; font-size: 1.1rem; }
        .links a { display: block; background: #21262d; color: #58a6ff; text-decoration: none; padding: 10px; margin: 5px 0; border-radius: 6px; font-size: 0.85rem; transition: 0.2s; }
        .links a:hover { background: #30363d; color: #f85149; }
        iframe { width: 100%; height: 450px; border-radius: 8px; border: 1px solid #30363d; background: #000; }
    </style>
</head>
<body>

<div class="grid">
    <div class="main">
        <div class="card">
            <h2>🎬 SİNEMA EKRANI</h2>
            <iframe src="https://www.youtube.com/embed/gdtEZEH7AnY" allowfullscreen></iframe>
        </div>
        
        <!-- ASİSTAN SADECE BURAYA DOSYA EKLEYEBİLİR -->
        <div class="card">
            <h2>📂 SENİN YÜKLEDİĞİN FİLMLER</h2>
            <div id="sinema-alani" class="links">
                <!-- SINEMA_LISTESI_BASLA -->
                <!-- SINEMA_LISTESI_BITIS -->
            </div>
        </div>
    </div>

    <div class="sidebar">
        <!-- İNTERNET KÜTÜPHANESİ - BURASI KİLİTLİ, ASİSTAN SİLEMEZ -->
        <div class="card">
            <h2>🏛️ KÜRESEL FİLM ARŞİVLERİ</h2>
            <div class="links">
                <a href="https://archive.org/details/feature_films" target="_blank">🌐 Internet Archive</a>
                <a href="https://www.youtube.com/c/mosfilm/videos" target="_blank">🇷🇺 Mosfilm Arşivi</a>
                <a href="https://www.openculture.com/freemoviesonline" target="_blank">📜 Open Culture</a>
                <a href="https://mubi.com" target="_blank">🎞️ MUBI</a>
            </div>
        </div>

        <div class="card">
            <h2>🏛️ MİMARİ KÜTÜPHANE (PDF)</h2>
            <div id="mimari-alani" class="links">
                <!-- MIMARI_LISTESI_BASLA -->
                <!-- MIMARI_LISTESI_BITIS -->
            </div>
        </div>

        <div class="card">
            <h2>🌿 BONSAİ TAKİP</h2>
            <div id="bonsai-alani" class="links">
                <!-- BONSAI_LISTESI_BASLA -->
                <!-- BONSAI_LISTESI_BITIS -->
            </div>
        </div>
    </div>
</div>

</body>
</html>

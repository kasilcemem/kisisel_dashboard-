<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişisel Sinema & Bilgi Üssü</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0f19; color: #e2e8f0; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        h1 { color: #e74c3c; border-bottom: 2px solid #1e293b; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; margin-top: 20px; }
        .card { background: #161b22; padding: 25px; border-radius: 15px; border: 1px solid #30363d; transition: 0.3s; }
        .card:hover { border-color: #e74c3c; }
        .card h3 { color: #f8fafc; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        .links a { display: block; color: #8b949e; text-decoration: none; padding: 12px 0; border-bottom: 1px solid #21262d; font-size: 0.95em; }
        .links a:hover { color: #e74c3c; padding-left: 8px; }
        .movie-box { margin-top: 20px; background: #000; border-radius: 10px; overflow: hidden; border: 1px solid #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Sinema & Arşiv Üssü</h1>
        <div class="grid">
            
            <!-- ANA SİNEMA KÜTÜPHANESİ -->
            <div class="card" style="grid-column: span 2;">
                <h3>🎥 Bağımsız & Entelektüel Sinema Arşivi</h3>
                <div class="links">
                    <!-- SINEMA_LISTESI -->
                    <a href="https://archive.org/details/feature_films" target="_blank">🏛️ Internet Archive: Dünya Sineması Klasikleri</a>
                    <a href="https://www.openculture.com/freemoviesonline" target="_blank">📜 Open Culture: 1150+ Ücretsiz Film</a>
                    <a href="https://mubi.com/tr/feed" target="_blank">🎞️ MUBI: Günlük Sinema Seçkisi</a>
                    <a href="https://www.youtube.com/c/mosfilm/videos" target="_blank">🇷🇺 Mosfilm: Sovyet Sineması Arşivi</a>
                </div>
                <div class="movie-box">
                    <iframe width="100%" height="400" src="https://www.youtube.com/embed/gdtEZEH7AnY" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>

            <!-- MİMARİ KÜTÜPHANE -->
            <div class="card">
                <h3>🏗️ Mimari & Teknik Arşiv</h3>
                <div class="links">
                    <!-- MIMARI_LISTESI -->
                    <a href="https://www.archdaily.com" target="_blank">🏢 ArchDaily Global</a>
                    <a href="https://www.neufert-international.com" target="_blank">📐 Neufert Standartları</a>
                </div>
            </div>

            <!-- BONSAİ TAKİP -->
            <div class="card">
                <h3>🌿 Bonsai Sanatı</h3>
                <div class="links">
                    <!-- BONSAI_LISTESI -->
                </div>
            </div>

        </div>
    </div>
</body>
</html>
